<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상벌점 관리 시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f4f3ff; min-height: 100vh; padding: 24px; color: #26215C; }
.tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.tab { font-size: 13px; padding: 6px 16px; border-radius: 8px; border: 0.5px solid #cbc8f0; background: #fff; color: #534AB7; cursor: pointer; font-weight: 400; transition: background 0.15s; }
.tab:hover { background: #eeedfe; }
.tab.active { background: #3C3489; color: #fff; border-color: #3C3489; font-weight: 500; }
.tab-add { font-size: 18px; padding: 4px 12px; border-radius: 8px; border: 0.5px dashed #cbc8f0; background: transparent; color: #aaa; cursor: pointer; line-height: 1; }
.tab-add:hover { color: #534AB7; border-color: #534AB7; }
.tab-del { font-size: 11px; margin-left: 5px; opacity: 0.6; cursor: pointer; vertical-align: middle; }
.tab-del:hover { opacity: 1; color: #D85A30; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 1.2rem; gap: 12px; flex-wrap: wrap; }
.title-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.title { font-size: 18px; font-weight: 500; color: #26215C; cursor: pointer; padding: 4px 10px; border-radius: 6px; border: 1.5px solid #d1cef5; background: #f5f4ff; display: inline-block; }
.title:hover { border-color: #534AB7; background: #eeedfe; }
.title-input { font-size: 18px; font-weight: 500; border: 1.5px solid #534AB7; border-radius: 6px; background: #fff; color: #26215C; outline: none; padding: 4px 10px; width: 260px; }
.edit-hint { font-size: 11px; color: #9f99e8; margin-left: 4px; }
.subtitle { font-size: 12px; color: #888; margin-top: 2px; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #cbc8f0; background: #fff; color: #26215C; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; }
.btn:hover { background: #f0eefd; }
.btn-primary { background: #3C3489; color: #fff; border-color: #3C3489; }
.btn-primary:hover { background: #534AB7; border-color: #534AB7; }
.topbar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 90px; background: #eeedfe; border: 1px solid #cbc8f0; border-radius: 8px; padding: 10px 14px; }
.stat-label { font-size: 11px; color: #534AB7; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; color: #26215C; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
.card { background: #fafafa; border: 1.5px solid #d1cef5; border-radius: 12px; padding: 14px; position: relative; transition: transform 0.12s, border-color 0.12s; }
.card:hover { border-color: #9f99e8; background: #f5f4ff; }
.card-rank { position: absolute; top: 10px; right: 10px; font-size: 11px; color: #aaa; font-weight: 500; }
.card-rank.gold { color: #BA7517; }
.card-rank.silver { color: #888780; }
.card-rank.bronze { color: #993C1D; }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; margin-bottom: 8px; }
.name-display { font-size: 14px; font-weight: 500; color: #26215C; cursor: pointer; padding: 3px 6px; border-radius: 6px; border: 1.5px solid #cbc8f0; background: #fff; display: inline-block; min-width: 80px; }
.name-display:hover { border-color: #534AB7; background: #eeedfe; }
.name-input { font-size: 14px; font-weight: 500; border: 1.5px solid #534AB7; border-radius: 6px; background: #fff; color: #26215C; width: 100%; outline: none; padding: 3px 6px; }
.score-area { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
.score-num { font-size: 24px; font-weight: 500; }
.score-positive { color: #0F6E56; }
.score-negative { color: #993C1D; }
.score-zero { color: #888; }
.level-badge { font-size: 11px; padding: 3px 7px; border-radius: 99px; font-weight: 500; }
.stars { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 8px; min-height: 18px; }
.section-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.history-row { display: flex; flex-wrap: wrap; gap: 2px; min-height: 12px; margin-bottom: 10px; }
.history-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.dot-plus { background: #1D9E75; }
.dot-minus { background: #D85A30; }
.btn-row { display: flex; gap: 6px; }
.btn-score { flex: 1; font-size: 18px; font-weight: 500; padding: 6px; border-radius: 8px; border: 1.5px solid #d1cef5; cursor: pointer; background: #fff; color: #26215C; transition: transform 0.1s, background 0.1s; }
.btn-score:hover { transform: scale(1.06); }
.btn-plus:hover { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
.btn-minus:hover { background: #FAECE7; color: #993C1D; border-color: #F0997B; }
.btn-score:active { transform: scale(0.95); }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 12px; border: 1.5px solid #d1cef5; padding: 1.5rem; width: 340px; max-width: 95vw; box-shadow: 0 4px 24px rgba(60,52,137,0.10); }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 0.75rem; color: #26215C; }
.modal textarea { width: 100%; height: 170px; border: 1px solid #cbc8f0; border-radius: 8px; padding: 10px; font-size: 13px; font-family: inherit; color: #26215C; background: #fafafa; resize: none; outline: none; }
.modal input[type=text] { width: 100%; border: 1px solid #cbc8f0; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; color: #26215C; background: #fafafa; outline: none; margin-bottom: 10px; }
.modal-actions { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
.reset-confirm { display: none; background: #FCEBEB; border: 1px solid #F09595; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #791F1F; }
.reset-confirm.show { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>

<div class="header">
  <div style="flex:1">
    <div class="title-wrap">
      <span class="title" id="titleDisplay" onclick="editTitle()" title="클릭해서 제목 수정"></span>
      <input class="title-input" id="titleInput" style="display:none" onblur="saveTitle()" onkeydown="if(event.key==='Enter')saveTitle()">
      <span class="edit-hint" id="titleHint">✏️ 클릭해서 수정</span>
    </div>
    <div class="subtitle">학생 이름 · 제목 · 반 이름 클릭하면 수정 가능</div>
  </div>
  <div class="controls">
    <button class="btn" onclick="openSetup()"><i class="ti ti-users"></i> 명단 설정</button>
    <button class="btn" onclick="showResetConfirm()"><i class="ti ti-refresh"></i> 초기화</button>
  </div>
</div>

<div class="reset-confirm" id="resetConfirm">
  <span id="resetMsg"></span>
  <div style="display:flex;gap:6px">
    <button class="btn" style="padding:4px 10px;font-size:12px" onclick="hideResetConfirm()">취소</button>
    <button class="btn" style="padding:4px 10px;font-size:12px;background:#A32D2D;color:#fff;border-color:#A32D2D" onclick="doReset()">초기화</button>
  </div>
</div>

<div class="topbar" id="topbar"></div>
<div class="grid" id="grid"></div>

<div class="modal-bg" id="setupModal">
  <div class="modal">
    <h3><i class="ti ti-users" style="margin-right:6px"></i>명단 설정 — <span id="setupClassName"></span></h3>
    <p style="font-size:12px;color:#888;margin-bottom:8px">한 줄에 이름 하나씩 입력 (최대 30명)</p>
    <textarea id="namesInput" placeholder="홍길동&#10;김철수&#10;이영희&#10;..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeSetup()">취소</button>
      <button class="btn btn-primary" onclick="applyNames()"><i class="ti ti-check"></i> 적용</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="addClassModal">
  <div class="modal">
    <h3><i class="ti ti-plus" style="margin-right:6px"></i>반 추가</h3>
    <input type="text" id="newClassName" placeholder="예: 2반, 3학년 1반 …" maxlength="20">
    <div class="modal-actions">
      <button class="btn" onclick="closeAddClass()">취소</button>
      <button class="btn btn-primary" onclick="applyAddClass()"><i class="ti ti-check"></i> 추가</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="renameClassModal">
  <div class="modal">
    <h3><i class="ti ti-edit" style="margin-right:6px"></i>반 이름 변경</h3>
    <input type="text" id="renameClassInput" placeholder="새 반 이름" maxlength="20">
    <div class="modal-actions">
      <button class="btn" onclick="closeRenameClass()">취소</button>
      <button class="btn btn-primary" onclick="applyRenameClass()"><i class="ti ti-check"></i> 변경</button>
    </div>
  </div>
</div>

<script>
const COLORS=[{bg:'#EEEDFE',text:'#3C3489'},{bg:'#E1F5EE',text:'#085041'},{bg:'#FAECE7',text:'#712B13'},{bg:'#E6F1FB',text:'#0C447C'},{bg:'#FBEAF0',text:'#72243E'},{bg:'#EAF3DE',text:'#27500A'},{bg:'#FAEEDA',text:'#633806'}];
const LEVELS=[{min:-99,label:'😟 주의',bg:'#FCEBEB',color:'#791F1F'},{min:0,label:'😐 보통',bg:'#F1EFE8',color:'#444441'},{min:5,label:'😊 좋아요',bg:'#E1F5EE',color:'#0F6E56'},{min:10,label:'⭐ 우수',bg:'#EEEDFE',color:'#3C3489'},{min:20,label:'🏆 최우수',bg:'#FAEEDA',color:'#633806'}];
function getLevel(s){let l=LEVELS[0];for(const x of LEVELS){if(s>=x.min)l=x;}return l;}

let data={},currentClass='',appTitle='🏫 우리 반 점수판';

function save(){try{localStorage.setItem('classPts3',JSON.stringify({data,appTitle}));}catch(e){}}
function load(){
  try{const r=localStorage.getItem('classPts3');if(r){const p=JSON.parse(r);data=p.data||{};appTitle=p.appTitle||'🏫 우리 반 점수판';}}catch(e){}
  if(!data||Object.keys(data).length===0){
    const defaults=['1반','2반','3반'];
    const names=[['홍길동','김민지','이준서','박서연','최도윤'],['정하은','강지호','윤소율','임현우','서아린'],['김태양','박나은','이시우','최유진','강민호']];
    defaults.forEach((cls,ci)=>{data[cls]=names[ci].map((n,i)=>({name:n,score:0,history:[],color:i%7}));});
  }
  const keys=Object.keys(data);
  if(!currentClass||!data[currentClass])currentClass=keys[0];
}

function editTitle(){
  document.getElementById('titleDisplay').style.display='none';
  document.getElementById('titleHint').style.display='none';
  const inp=document.getElementById('titleInput');
  inp.value=appTitle;inp.style.display='inline-block';inp.focus();inp.select();
}
function saveTitle(){
  const v=document.getElementById('titleInput').value.trim();
  if(v)appTitle=v;
  document.getElementById('titleInput').style.display='none';
  document.getElementById('titleDisplay').style.display='inline-block';
  document.getElementById('titleHint').style.display='inline';
  document.getElementById('titleDisplay').textContent=appTitle;
  save();
}

function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  Object.keys(data).forEach(cls=>{
    const t=document.createElement('button');
    t.className='tab'+(cls===currentClass?' active':'');
    const editIcon=`<span class="tab-del" onclick="openRenameClass(event,'${cls}')" title="${cls} 이름 변경" style="opacity:0.5;margin-left:4px">✏️</span>`;
    const delIcon=Object.keys(data).length>1?`<span class="tab-del" onclick="deleteClass(event,'${cls}')" title="${cls} 삭제" style="margin-left:2px">✕</span>`:'';
    t.innerHTML=cls+editIcon+delIcon;
    t.addEventListener('click',(e)=>{if(e.target.classList.contains('tab-del'))return;currentClass=cls;renderAll();});
    el.appendChild(t);
  });
  const add=document.createElement('button');
  add.className='tab-add';add.title='반 추가';add.textContent='+';add.onclick=openAddClass;
  el.appendChild(add);
}

function openRenameClass(e,cls){
  e.stopPropagation();currentClass=cls;
  document.getElementById('renameClassInput').value=cls;
  document.getElementById('renameClassModal').classList.add('open');
  setTimeout(()=>document.getElementById('renameClassInput').focus(),50);
}
function closeRenameClass(){document.getElementById('renameClassModal').classList.remove('open');}
function applyRenameClass(){
  const newName=document.getElementById('renameClassInput').value.trim();
  if(!newName)return;
  if(newName===currentClass){closeRenameClass();return;}
  if(data[newName]){alert('이미 있는 반 이름이에요.');return;}
  const keys=Object.keys(data);const newData={};
  keys.forEach(k=>{newData[k===currentClass?newName:k]=data[k];});
  data=newData;currentClass=newName;
  save();closeRenameClass();renderAll();
}

function renderStats(){
  const students=data[currentClass];
  const sorted=[...students].sort((a,b)=>b.score-a.score);
  const n=students.length,top=n?sorted[0].score:0,avg=n?Math.round(students.reduce((a,s)=>a+s.score,0)/n):0;
  document.getElementById('titleDisplay').textContent=appTitle;
  document.getElementById('topbar').innerHTML=`
    <div class="stat-card"><div class="stat-label">전체 학생</div><div class="stat-value">${n}</div></div>
    <div class="stat-card"><div class="stat-label">최고 점수</div><div class="stat-value" style="color:#0F6E56">${top>0?'+':''}${top}</div></div>
    <div class="stat-card"><div class="stat-label">평균 점수</div><div class="stat-value">${avg>0?'+':''}${avg}</div></div>
    <div class="stat-card"><div class="stat-label">🥇 1위</div><div class="stat-value" style="font-size:14px;padding-top:4px;color:#BA7517">${n?sorted[0].name:'—'}</div></div>`;
}

function renderGrid(){
  const students=data[currentClass];
  const sorted=[...students].sort((a,b)=>b.score-a.score);
  const grid=document.getElementById('grid');grid.innerHTML='';
  sorted.forEach((s,rank)=>{
    const lv=getLevel(s.score),col=COLORS[s.color],idx=students.indexOf(s);
    const stars=s.score>0?Math.min(s.score,10):0;
    const sc=s.score>0?'score-positive':s.score<0?'score-negative':'score-zero';
    const rkLabel=rank===0?'<span class="card-rank gold">🥇 1위</span>':rank===1?'<span class="card-rank silver">🥈 2위</span>':rank===2?'<span class="card-rank bronze">🥉 3위</span>':`<span class="card-rank">${rank+1}위</span>`;
    const hist=s.history.slice(-15).map(h=>`<span class="history-dot ${h>0?'dot-plus':'dot-minus'}"></span>`).join('');
    const starHtml=Array(stars).fill('⭐').join('');
    const div=document.createElement('div');div.className='card';
    div.innerHTML=`${rkLabel}
      <div class="avatar" style="background:${col.bg};color:${col.text}">${s.name[0]||'?'}</div>
      <div class="name-display" id="nd-${idx}" onclick="editName(${idx})" title="클릭해서 수정">${s.name}</div>
      <input class="name-input" id="ni-${idx}" value="${s.name}" style="display:none" onblur="saveName(${idx})" onkeydown="if(event.key==='Enter')saveName(${idx})">
      <div class="score-area">
        <span class="score-num ${sc}">${s.score>0?'+':''}${s.score}</span>
        <span class="level-badge" style="background:${lv.bg};color:${lv.color}">${lv.label}</span>
      </div>
      <div class="stars">${starHtml||'<span style="font-size:11px;color:#bbb">아직 없음</span>'}</div>
      <div class="section-label">기록</div>
      <div class="history-row">${hist||'<span style="font-size:11px;color:#bbb">—</span>'}</div>
      <div class="btn-row">
        <button class="btn-score btn-minus" onclick="changeScore(${idx},-1)">−</button>
        <button class="btn-score btn-plus" onclick="changeScore(${idx},1)">＋</button>
      </div>`;
    grid.appendChild(div);
  });
}

function renderAll(){renderTabs();renderStats();renderGrid();}
function changeScore(idx,delta){data[currentClass][idx].score+=delta;data[currentClass][idx].history.push(delta);save();renderAll();}
function editName(idx){document.getElementById('nd-'+idx).style.display='none';const inp=document.getElementById('ni-'+idx);inp.style.display='block';inp.focus();inp.select();}
function saveName(idx){const v=document.getElementById('ni-'+idx).value.trim();if(v)data[currentClass][idx].name=v;save();renderAll();}
function openSetup(){document.getElementById('setupClassName').textContent=currentClass;document.getElementById('namesInput').value=data[currentClass].map(s=>s.name).join('\n');document.getElementById('setupModal').classList.add('open');}
function closeSetup(){document.getElementById('setupModal').classList.remove('open');}
function applyNames(){
  const lines=document.getElementById('namesInput').value.split('\n').map(l=>l.trim()).filter(Boolean).slice(0,30);
  if(!lines.length)return;
  const existing={};data[currentClass].forEach(s=>existing[s.name]=s);
  data[currentClass]=lines.map((n,i)=>existing[n]||{name:n,score:0,history:[],color:i%7});
  save();closeSetup();renderAll();
}
function openAddClass(){document.getElementById('newClassName').value='';document.getElementById('addClassModal').classList.add('open');setTimeout(()=>document.getElementById('newClassName').focus(),50);}
function closeAddClass(){document.getElementById('addClassModal').classList.remove('open');}
function applyAddClass(){
  const name=document.getElementById('newClassName').value.trim();
  if(!name)return;
  if(data[name]){alert('이미 있는 반 이름이에요.');return;}
  data[name]=[];currentClass=name;save();closeAddClass();renderAll();
}
function deleteClass(e,cls){
  e.stopPropagation();
  if(Object.keys(data).length<=1){alert('마지막 반은 삭제할 수 없어요.');return;}
  if(!confirm(`"${cls}"을(를) 삭제할까요? 점수 데이터도 모두 사라져요.`))return;
  delete data[cls];if(currentClass===cls)currentClass=Object.keys(data)[0];save();renderAll();
}
function showResetConfirm(){document.getElementById('resetMsg').textContent=`"${currentClass}" 점수를 모두 0으로 초기화할까요?`;document.getElementById('resetConfirm').classList.add('show');}
function hideResetConfirm(){document.getElementById('resetConfirm').classList.remove('show');}
function doReset(){data[currentClass].forEach(s=>{s.score=0;s.history=[];});save();hideResetConfirm();renderAll();}

load();renderAll();
</script>
</body>
</html>
